name: Build NanoPi R5S

on:
  workflow_dispatch:
  repository_dispatch:
    types: [release]

jobs:
  build:
    name: Build nanopi-r5s
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup variables
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        git config --global user.name 'actions'
        git config --global user.email 'action@github.com'
        echo build_dir="/builder" >> "$GITHUB_ENV"
        echo ccache_model="nanopi-r5s" >> "$GITHUB_ENV"

    - name: Show system
      run: |
        echo -e "\n\e[1;32mCPU:\e[0m"
        echo "$(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') ($(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')MHz) x $(grep processor /proc/cpuinfo  | wc -l)"
        echo -e "\n\e[1;32mMemory:\e[0m"
        free -h
        echo -e "\n\e[1;32mStorage:\e[0m"
        df -Th / /mnt
        echo -e "\n\e[1;32mSystem:\e[0m"
        lsb_release -a
        echo -e "\n\e[1;32mKernel:\e[0m"
        uname -a
        echo

    - name: Free disk space
      uses: sbwml/actions@free-disk
      with:
        build-mount-path: /builder

    - name: Build System Setup
      uses: sbwml/actions@openwrt-build-setup

    - name: Install LLVM
      uses: sbwml/actions@install-llvm

    - name: Restore Cached
      uses: actions/cache/restore@v5
      with:
        path: /builder/.ccache
        key: openwrt-25.12-nanopi-r5s

    - name: Compile OpenWrt
      id: compile
      continue-on-error: true
      working-directory: /builder
      env:
        git_name: private
        git_password: ${{ secrets.ftp_password }}
        private_url: ${{ secrets.private_url }}
      run: |
        # 复制本地主构建脚本（不再从 URL 下载）
        cp $GITHUB_WORKSPACE/r5s/build.sh build.sh

        # 创建 openwrt 目录
        mkdir -p openwrt

        # 复制自定义配置文件
        cp $GITHUB_WORKSPACE/r5s/config-musl-r5s openwrt/25-config-musl-r5s-custom

        # 复制自定义 10-custom.sh
        cp $GITHUB_WORKSPACE/r5s/custom.sh openwrt/10-custom.sh
        chmod +x openwrt/10-custom.sh

        # 修改主脚本，将 r5s 的配置下载命令改为复制本地文件
        sed -i 's|curl -s \$mirror/openwrt/25-config-musl-r5s|cp openwrt/25-config-musl-r5s-custom|' build.sh

        # 执行构建
        export KERNEL_CLANG_LTO=y BUILD_FAST=y ENABLE_CCACHE=y ENABLE_OTA=y ENABLE_BPF=y ENABLE_LTO=y ENABLE_LRNG=y USE_GCC15=y ENABLE_MOLD=y
        bash build.sh rc2 nanopi-r5s

        cd openwrt
        tags=$(git describe --abbrev=0 --tags)
        echo "latest_release=$tags" >>$GITHUB_ENV

    - name: Extensive logs after a failed compilation
      if: steps.compile.outcome == 'failure'
      working-directory: /builder
      run: |
        cd openwrt
        make V=s IGNORE_ERRORS="n m"

    # ========== 以下是提取 rootfs 和打包步骤 ==========
    - name: List generated files
      if: always()
      working-directory: /builder
      run: |
        echo "=== Full content of openwrt/bin/targets/rockchip ==="
        find openwrt/bin/targets/rockchip -type f | sort
        echo "=== End of listing ==="

    - name: Extract rootfs from squashfs image using loop device
      id: extract_rootfs
      working-directory: /builder
      run: |
        SQUASHFS_IMG=$(find openwrt/bin/targets/rockchip -name "*-squashfs-sysupgrade.img.gz" | head -n1)
        if [ -z "$SQUASHFS_IMG" ]; then
          echo "::error::No squashfs image found!"
          exit 1
        fi
        echo "Found squashfs image: $SQUASHFS_IMG"

        mkdir -p rootfs_extract
        set +e
        gunzip -c "$SQUASHFS_IMG" > rootfs_extract/firmware.img
        GUNZIP_EXIT_CODE=$?
        set -e
        if [ $GUNZIP_EXIT_CODE -ne 0 ] && [ $GUNZIP_EXIT_CODE -ne 2 ]; then
          echo "::error::gunzip failed with exit code $GUNZIP_EXIT_CODE"
          exit 1
        fi
        echo "gunzip completed with exit code $GUNZIP_EXIT_CODE (0 or 2 is acceptable)"

        sudo losetup -fP rootfs_extract/firmware.img
        LOOP_DEV=$(sudo losetup -l | grep firmware.img | awk '{print $1}')
        if [ -z "$LOOP_DEV" ]; then
          echo "::error::Failed to get loop device"
          exit 1
        fi
        echo "Loop device: $LOOP_DEV"

        mkdir -p rootfs_mount
        if sudo mount ${LOOP_DEV}p2 rootfs_mount 2>/dev/null; then
          echo "Mounted partition p2 as rootfs"
        else
          echo "Failed to mount p2, trying p1..."
          sudo mount ${LOOP_DEV}p1 rootfs_mount || {
            echo "::error::Failed to mount any partition"
            sudo losetup -d $LOOP_DEV
            exit 1
          }
        fi

        sudo tar -czf rootfs_extract/rootfs.tar.gz -C rootfs_mount . || {
          echo "::error::Failed to create tar"
          sudo umount rootfs_mount
          sudo losetup -d $LOOP_DEV
          exit 1
        }

        sudo umount rootfs_mount
        sudo losetup -d $LOOP_DEV
        sudo chown $(id -u):$(id -g) rootfs_extract/rootfs.tar.gz

        ROOTFS_TAR="$(pwd)/rootfs_extract/rootfs.tar.gz"
        echo "ROOTFS_TAR=$ROOTFS_TAR" >> $GITHUB_ENV
        echo "Rootfs tar created: $ROOTFS_TAR"

    - name: Extract official boot files
      working-directory: /builder
      run: |
        OFFICIAL_URL="https://github.com/friendlyarm/Actions-FriendlyWrt/releases/download/FriendlyWrt-2026-03-06/R5S-R5C-Series-FriendlyWrt-24.10-docker.img.gz"
        echo "Downloading official FriendlyWrt image..."
        wget -q -O official.img.gz "$OFFICIAL_URL"
        gunzip official.img.gz

        sudo losetup -fP official.img
        LOOP_DEV=$(sudo losetup -l | grep official.img | awk '{print $1}')
        if [ -z "$LOOP_DEV" ]; then
          echo "::error::Failed to get loop device for official image"
          exit 1
        fi
        mkdir -p official_boot
        sudo mount ${LOOP_DEV}p1 official_boot

        mkdir -p r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s
        sudo cp -r official_boot/* r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/
        sudo chown -R $(id -u):$(id -g) r5s/files/bootfiles

        sudo umount official_boot
        sudo losetup -d $LOOP_DEV
        rm official.img
        echo "Official boot files extracted to r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/"
        ls -la r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/

    - name: Prepare files for packit
      working-directory: /builder
      run: |
        mkdir -p files
        [ -d r5s/files ] && cp -r r5s/files/* files/ || true
        echo "=== Prepared files for packit (root directory) ==="
        find files -type f | sort

    - name: Package firmware (6.12.y)
      id: package_6_12
      continue-on-error: true
      uses: unifreq/openwrt_packit@master
      with:
        rootfs: ${{ env.ROOTFS_TAR }}
        kernel_repo: breakingbadboy/OpenWrt
        kernel_version: 6.12.y
        soc: diy
        diy_script: r5s/mk_rk3568_r5s.sh
        whoami: tmxia
        sw_flowoffload: 0
        sfe_flow: 0
        output_format: gz
        files_dir: /builder/files

    - name: Check for packaged firmware
      id: check_firmware
      run: |
        if ls /opt/openwrt_packit/output/*.img.gz 1> /dev/null 2>&1; then
          echo "Firmware files found."
          echo "has_firmware=true" >> $GITHUB_OUTPUT
        else
          echo "::warning::No firmware files were generated!"
          echo "has_firmware=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.check_firmware.outputs.has_firmware == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: R5S_OpenWrt_${{ env.PACKAGED_OUTPUTDATE }}
        files: /opt/openwrt_packit/output/*.img.gz
        body: |
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.3.3
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 2
        delete_tags: true