name: Build NanoPi R5S

on:
  workflow_dispatch:
  repository_dispatch:
    types: [release]

jobs:
  build:
    name: Build nanopi-r5s
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup variables
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        git config --global user.name 'actions'
        git config --global user.email 'action@github.com'
        echo "build_dir=/builder" >> $GITHUB_ENV
        echo "ccache_model=nanopi-r5s" >> $GITHUB_ENV

    - name: Show system info
      run: |
        echo -e "\n\e[1;32mCPU:\e[0m"
        echo "$(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') ($(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')MHz) x $(grep processor /proc/cpuinfo | wc -l)"
        echo -e "\n\e[1;32mMemory:\e[0m"
        free -h
        echo -e "\n\e[1;32mStorage:\e[0m"
        df -Th / /mnt
        echo -e "\n\e[1;32mSystem:\e[0m"
        lsb_release -a
        echo -e "\n\e[1;32mKernel:\e[0m"
        uname -a

    - name: Free disk space
      uses: sbwml/actions@free-disk
      with:
        build-mount-path: /builder

    - name: Build System Setup
      uses: sbwml/actions@openwrt-build-setup

    - name: Install LLVM
      uses: sbwml/actions@install-llvm

    - name: Restore Cached
      uses: actions/cache/restore@v5
      with:
        path: /builder/.ccache
        key: openwrt-25.12-nanopi-r5s

    - name: Compile OpenWrt
      id: compile
      continue-on-error: true
      working-directory: /builder
      env:
        git_name: private
        git_password: ${{ secrets.ftp_password }}
        private_url: ${{ secrets.private_url }}
        LAN: 192.168.3.1
      run: |
        # 1. 复制构建脚本和自定义文件
        cp $GITHUB_WORKSPACE/r5s/build.sh build.sh          # 注意：build.sh 需预先存在于仓库 r5s/ 下
        mkdir -p openwrt
        cp $GITHUB_WORKSPACE/r5s/config-musl-r5s openwrt/25-config-musl-r5s-custom
        cp $GITHUB_WORKSPACE/r5s/custom.sh openwrt/custom.sh
        chmod +x openwrt/custom.sh

        # 2. 修改 build.sh：在 rk3568 分支中使用本地配置并执行 custom.sh
        sed -i '/^elif \[ "$platform" = "rk3568" \]; then$/,/^else$/{ 
            s|curl -s \$mirror/openwrt/25-config-musl-r5s > .config|cp openwrt/25-config-musl-r5s-custom .config\nbash custom.sh|
        }' build.sh

        # 3. 执行构建
        export KERNEL_CLANG_LTO=y BUILD_FAST=y ENABLE_CCACHE=y ENABLE_OTA=y ENABLE_BPF=y ENABLE_LTO=y ENABLE_LRNG=y USE_GCC15=y ENABLE_MOLD=y
        bash build.sh rc2 nanopi-r5s

        # 4. 获取版本号
        cd openwrt
        tags=$(git describe --abbrev=0 --tags)
        echo "latest_release=$tags" >> $GITHUB_ENV

    - name: Extensive logs after a failed compilation
      if: steps.compile.outcome == 'failure'
      working-directory: /builder
      run: |
        cd openwrt
        make V=s IGNORE_ERRORS="n m"

    - name: Prepare Firmware Files
      working-directory: /builder
      run: |
        # 尝试查找生成的固件
        if [ -d "openwrt/bin/targets/rockchip" ]; then
            mkdir -p rom info
            cp -a openwrt/bin/targets/rockchip/*/*.img.gz rom/ 2>/dev/null || true
            cp -a openwrt/bin/targets/rockchip/*/*.manifest info/manifest.txt 2>/dev/null || true
            cp -a openwrt/bin/targets/rockchip/*/config.buildinfo info/config.buildinfo 2>/dev/null || true
            cd rom && sha256sum *gz > ../info/sha256sums.txt 2>/dev/null || true
            cd ..
            tar zcf rom/buildinfo_nanopi-r5s.tar.gz info 2>/dev/null || true
            echo '## Releases Version' > ${{ env.build_dir }}/bodyFile
            echo '**Custom build for NanoPi R5S with Nikki, Docker, etc.**' >> ${{ env.build_dir }}/bodyFile
        else
            echo "Warning: rockchip directory not found, listing available targets..."
            find openwrt/bin/targets -type d 2>/dev/null || echo "No targets found"
            mkdir -p rom info
            find openwrt/bin/targets -name "*.img.gz" -exec cp {} rom/ \; 2>/dev/null || true
            if ls rom/*.img.gz 1> /dev/null 2>&1; then
                cd rom && sha256sum *gz > ../info/sha256sums.txt
                cd ..
                echo '## Releases Version' > ${{ env.build_dir }}/bodyFile
                echo '**Custom build for NanoPi R5S**' >> ${{ env.build_dir }}/bodyFile
            else
                echo "No firmware files found!"
                exit 1
            fi
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.latest_release }}
        name: OpenWrt-${{ env.latest_release }}
        body_path: ${{ env.build_dir }}/bodyFile
        files: |
          ${{ env.build_dir }}/rom/*

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 2
        delete_tags: true