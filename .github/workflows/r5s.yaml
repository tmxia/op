name: R5S-IMM

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  schedule:
    - cron: "0 0 1,16 * *"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DEPENDENCIES_FILE: r5s/dependencies.txt
  CONFIG_FILE: r5s/.config
  DIY_SH: r5s/diy.sh
  FILES: r5s/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq install $(cat $DEPENDENCIES_FILE)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        chmod +x $DIY_SH
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        $GITHUB_WORKSPACE/$DIY_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config

    - name: SSH connect to Actions (debug)
      uses: P3TERX/ssh2actions@main
      if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')

    - name: Prepare config and download
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "compile_status=success" >> $GITHUB_ENV

    - name: List generated files (debug)
      if: always()
      run: |
        echo "=== Full content of openwrt/bin/targets/rockchip ==="
        find openwrt/bin/targets/rockchip -type f | sort
        echo "=== End of listing ==="

    - name: Extract rootfs from squashfs image
      id: extract_rootfs
      run: |
        SQUASHFS_IMG=$(find openwrt/bin/targets/rockchip -name "*-squashfs-sysupgrade.img.gz" | head -n1)
        if [ -z "$SQUASHFS_IMG" ]; then
          echo "::error::No squashfs image found!"
          exit 1
        fi
        echo "Found squashfs image: $SQUASHFS_IMG"
        mkdir -p rootfs_extract
        gunzip -c "$SQUASHFS_IMG" > rootfs_extract/firmware.img
        sudo losetup -fP rootfs_extract/firmware.img
        LOOP_DEV=$(sudo losetup -l | grep firmware.img | awk '{print $1}')
        mkdir -p rootfs_mount
        sudo mount ${LOOP_DEV}p2 rootfs_mount
        sudo tar -czf rootfs_extract/rootfs.tar.gz -C rootfs_mount .
        sudo umount rootfs_mount
        sudo losetup -d $LOOP_DEV
        sudo chown $(id -u):$(id -g) rootfs_extract/rootfs.tar.gz
        ROOTFS_TAR="$(pwd)/rootfs_extract/rootfs.tar.gz"
        echo "ROOTFS_TAR=$ROOTFS_TAR" >> $GITHUB_ENV
        echo "Rootfs tar created: $ROOTFS_TAR"

    - name: Package rockchip firmware
      id: package
      if: ${{ env.compile_status }} == 'success' && !cancelled()
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_OUTPUT_FORMAT: gz
        OPENWRT_ARMVIRT: ${{ env.ROOTFS_TAR }}
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.12.y
        PACKAGE_SOC: diy
        SCRIPT_DIY_PATH: r5s/mk_rk3568_r5s.sh
        WHOAMI: tmxia
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Check for packaged firmware
      id: check_firmware
      run: |
        if ls /opt/openwrt_packit/output/*.img.gz 1> /dev/null 2>&1; then
          echo "has_firmware=true" >> $GITHUB_OUTPUT
        else
          echo "has_firmware=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.check_firmware.outputs.has_firmware == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: OpenWrt_${{ env.PACKAGED_OUTPUTDATE }}
        files: /opt/openwrt_packit/output/*.img.gz
        body: |
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.3.3
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 2
        delete_tags: true