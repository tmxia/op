name: Nanopi-R5s-IMM

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  schedule:
    - cron: "0 0 5,16 * *"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DEPENDENCIES_FILE: r5s/dependencies.txt
  CONFIG_FILE: r5s/.config
  DIY_SH: r5s/diy.sh
  FILES: r5s/files
  TZ: Asia/Shanghai
  KERNEL_VERSIONS: "6.12.y 6.18.y"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq install $(cat $DEPENDENCIES_FILE)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        chmod +x $DIY_SH
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        $GITHUB_WORKSPACE/$DIY_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && cp -r $FILES openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config

    - name: SSH connect to Actions
      uses: P3TERX/ssh2actions@main
      if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')

    # 修正内核配置
    - name: Customize kernel config
      run: |
        cd openwrt
        for ver in 6.12 6.18; do
          config_file="target/linux/rockchip/armv8/config-${ver}"
          if [ -f "$config_file" ]; then
            echo "Patching $config_file ..."
            grep -q "CONFIG_ROCKCHIP_RK3568_GMAC" "$config_file" || echo "CONFIG_ROCKCHIP_RK3568_GMAC=y" >> "$config_file"
            grep -q "CONFIG_ROCKCHIP_PHY" "$config_file" || echo "CONFIG_ROCKCHIP_PHY=y" >> "$config_file"
            grep -q "CONFIG_PHY_ROCKCHIP_INNO_USB2" "$config_file" || echo "CONFIG_PHY_ROCKCHIP_INNO_USB2=y" >> "$config_file"
            grep -q "CONFIG_PHY_ROCKCHIP_NANENG_COMBO_PHY" "$config_file" || echo "CONFIG_PHY_ROCKCHIP_NANENG_COMBO_PHY=y" >> "$config_file"
            grep -q "CONFIG_PCIE_ROCKCHIP" "$config_file" || echo "CONFIG_PCIE_ROCKCHIP=y" >> "$config_file"
            grep -q "CONFIG_BTRFS_FS" "$config_file" || echo "CONFIG_BTRFS_FS=y" >> "$config_file"
            grep -q "CONFIG_ZSTD_COMPRESS" "$config_file" || echo "CONFIG_ZSTD_COMPRESS=y" >> "$config_file"
            grep -q "CONFIG_SERIAL_8250_16550A" "$config_file" || echo "CONFIG_SERIAL_8250_16550A=y" >> "$config_file"
          else
            echo "Warning: Kernel config $config_file not found, skipping."
          fi
        done

    - name: Prepare config and download
      working-directory: ./openwrt
      run: |
        make defconfig
        sed -i '/CONFIG_TARGET_ROOTFS_TAR=/d' .config
        echo "CONFIG_TARGET_ROOTFS_TAR=y" >> .config
        make download -j8
        find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: List generated files
      if: always()
      run: |
        echo "=== Full content of openwrt/bin/targets/rockchip ==="
        find openwrt/bin/targets/rockchip -type f | sort
        echo "=== End of listing ==="

    - name: Extract rootfs from squashfs image using loop device
      id: extract_rootfs
      run: |
        SQUASHFS_IMG=$(find openwrt/bin/targets/rockchip -name "*-squashfs-sysupgrade.img.gz" | head -n1)
        if [ -z "$SQUASHFS_IMG" ]; then
          echo "::error::No squashfs image found!"
          exit 1
        fi
        echo "Found squashfs image: $SQUASHFS_IMG"

        mkdir -p rootfs_extract
        set +e
        gunzip -c "$SQUASHFS_IMG" > rootfs_extract/firmware.img
        GUNZIP_EXIT_CODE=$?
        set -e
        if [ $GUNZIP_EXIT_CODE -ne 0 ] && [ $GUNZIP_EXIT_CODE -ne 2 ]; then
          echo "::error::gunzip failed with exit code $GUNZIP_EXIT_CODE"
          exit 1
        fi
        echo "gunzip completed with exit code $GUNZIP_EXIT_CODE (0 or 2 is acceptable)"

        sudo losetup -fP rootfs_extract/firmware.img
        LOOP_DEV=$(sudo losetup -l | grep firmware.img | awk '{print $1}')
        if [ -z "$LOOP_DEV" ]; then
          echo "::error::Failed to get loop device"
          exit 1
        fi
        echo "Loop device: $LOOP_DEV"

        mkdir -p rootfs_mount
        if sudo mount ${LOOP_DEV}p2 rootfs_mount 2>/dev/null; then
          echo "Mounted partition p2 as rootfs"
        else
          echo "Failed to mount p2, trying p1..."
          sudo mount ${LOOP_DEV}p1 rootfs_mount || {
            echo "::error::Failed to mount any partition"
            sudo losetup -d $LOOP_DEV
            exit 1
          }
        fi

        sudo tar -czf rootfs_extract/rootfs.tar.gz -C rootfs_mount . || {
          echo "::error::Failed to create tar"
          sudo umount rootfs_mount
          sudo losetup -d $LOOP_DEV
          exit 1
        }

        sudo umount rootfs_mount
        sudo losetup -d $LOOP_DEV
        sudo chown $(id -u):$(id -g) rootfs_extract/rootfs.tar.gz

        ROOTFS_TAR="$(pwd)/rootfs_extract/rootfs.tar.gz"
        echo "ROOTFS_TAR=$ROOTFS_TAR" >> $GITHUB_ENV
        echo "Rootfs tar created: $ROOTFS_TAR"

    - name: Prepare boot files from compiled artifacts
      run: |
        mkdir -p r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s

        echo "=== Listing all files in openwrt/bin/targets/rockchip ==="
        find openwrt/bin/targets/rockchip -type f | sort

        KERNEL_IMG=$(find openwrt/bin/targets/rockchip -type f \( -name "Image" -o -name "zImage" -o -name "kernel" -o -name "kernel.img" \) | head -n1)
        if [ -z "$KERNEL_IMG" ]; then
          echo "::error::Kernel image not found in build output!"
          exit 1
        fi
        echo "Found kernel: $KERNEL_IMG"
        cp "$KERNEL_IMG" r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/Image
        if [[ "$KERNEL_IMG" == *"zImage"* ]]; then
          cp "$KERNEL_IMG" r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/zImage
        fi

        DTB_FILES=$(find openwrt/bin/targets/rockchip -type f -name "rk3568-nanopi-r5s*.dtb" | head -n1)
        if [ -z "$DTB_FILES" ]; then
          echo "::error::DTB files not found!"
          exit 1
        fi
        echo "Found DTB: $DTB_FILES"
        cp "$DTB_FILES" r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/

        echo "Boot files prepared" > r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/placeholder.txt

    - name: Prepare files for packit
      run: |
        mkdir -p files
        [ -d r5s/files ] && cp -r r5s/files/* files/ || true
        echo "=== Prepared files for packit (root directory) ==="
        find files -type f | sort

    - name: Package firmware (6.12.y)
      id: package_6_12
      continue-on-error: true
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_OUTPUT_FORMAT: gz
        OPENWRT_ARMVIRT: ${{ env.ROOTFS_TAR }}
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.12.y
        PACKAGE_SOC: diy
        SCRIPT_DIY_PATH: r5s/mk_rk3568_r5s.sh
        WHOAMI: tmxia
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Check for packaged firmware
      id: check_firmware
      run: |
        if ls /opt/openwrt_packit/output/*.img.gz 1> /dev/null 2>&1; then
          echo "Firmware files found."
          echo "has_firmware=true" >> $GITHUB_OUTPUT
        else
          echo "::warning::No firmware files were generated!"
          echo "has_firmware=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.check_firmware.outputs.has_firmware == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: R5S_OpenWrt_${{ env.PACKAGED_OUTPUTDATE }}
        files: /opt/openwrt_packit/output/*.img.gz
        body: |
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.3.3
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 2
        delete_tags: true