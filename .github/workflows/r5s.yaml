name: R5S-IMM

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  schedule:
    - cron: "0 0 1,16 * *"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DEPENDENCIES_FILE: r5s/dependencies.txt
  CONFIG_FILE: r5s/.config
  DIY_SH: r5s/diy.sh
  FILES: r5s/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq install $(cat $DEPENDENCIES_FILE)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        chmod +x $DIY_SH
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        $GITHUB_WORKSPACE/$DIY_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config

    - name: SSH connect to Actions
      uses: P3TERX/ssh2actions@main
      if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "compile_status=success" >> $GITHUB_ENV

    - name: List generated files (debug)
      if: always()
      run: |
        echo "=== Full content of openwrt/bin/targets/rockchip ==="
        find openwrt/bin/targets/rockchip -type f | sort
        echo "=== End of listing ==="

    - name: Prepare rootfs archive
      id: prepare_rootfs
      run: |
        cd openwrt/bin/targets/rockchip
        # 查找 rootfs 归档，支持多种命名模式
        ROOTFS_TAR=$(find . -type f -name "*rootfs*.tar.gz" | head -n1)
        if [ -n "$ROOTFS_TAR" ]; then
          echo "Found rootfs.tar.gz: $ROOTFS_TAR"
          echo "ROOTFS_TAR=$(realpath "$ROOTFS_TAR")" >> $GITHUB_ENV
          exit 0
        fi

        # 如果没找到，尝试从 squashfs 镜像提取
        echo "No rootfs.tar.gz found, extracting from squashfs image..."
        SQUASHFS_IMG=$(find . -name "*-squashfs-sysupgrade.img.gz" | head -n1)
        if [ -z "$SQUASHFS_IMG" ]; then
          echo "::error::No squashfs image found either!"
          exit 1
        fi
        echo "Found squashfs image: $SQUASHFS_IMG"

        mkdir -p rootfs_extract
        set +e
        gunzip -c "$SQUASHFS_IMG" > rootfs_extract/firmware.img
        GUNZIP_EXIT=$?
        set -e
        if [ $GUNZIP_EXIT -eq 1 ]; then
          echo "::error::gunzip failed with fatal error (exit code 1)"
          exit 1
        fi
        if [ $GUNZIP_EXIT -eq 2 ]; then
          echo "::warning::gunzip reported trailing garbage (exit code 2), but image was decompressed."
        fi

        sudo losetup -fP rootfs_extract/firmware.img
        LOOP_DEV=$(sudo losetup -l | grep firmware.img | awk '{print $1}')
        mkdir -p rootfs_mount
        # 尝试挂载第二分区（rockchip sysupgrade 镜像的 rootfs 通常在 p2）
        if ! sudo mount ${LOOP_DEV}p2 rootfs_mount 2>/dev/null; then
          echo "Mounting p2 failed, trying p1..."
          sudo mount ${LOOP_DEV}p1 rootfs_mount
        fi
        sudo tar -czf rootfs_extract/rootfs.tar.gz -C rootfs_mount .
        sudo umount rootfs_mount
        sudo losetup -d $LOOP_DEV
        sudo chown $(id -u):$(id -g) rootfs_extract/rootfs.tar.gz
        ROOTFS_TAR="$(pwd)/rootfs_extract/rootfs.tar.gz"
        echo "ROOTFS_TAR=$ROOTFS_TAR" >> $GITHUB_ENV
        echo "Rootfs tar created from squashfs: $ROOTFS_TAR"

    # 关键修复：将 U-Boot 文件复制到 openwrt_packit 能访问的位置
    - name: Prepare U-Boot files
      run: |
        mkdir -p uboot
        cp r5s/idbloader.img uboot/
        cp r5s/u-boot.itb uboot/
        echo "U-Boot files copied to uboot/ directory"

    - name: Package rockchip as openwrt
      if: ${{ env.compile_status }} == 'success' && !cancelled()
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_OUTPUT_FORMAT: gz
        OPENWRT_ARMVIRT: ${{ env.ROOTFS_TAR }}
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.12.y
        PACKAGE_SOC: diy
        SCRIPT_DIY_PATH: r5s/mk_rk3568_r5s.sh
        WHOAMI: tmxia
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: ${{ env.PACKAGED_STATUS == 'success' }} && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: OpenWrt_R5S_${{ env.PACKAGED_OUTPUTDATE }}
        files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        body: |
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.3.3
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 2
        delete_tags: true