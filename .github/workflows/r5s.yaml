name: Nanopi-R5s-IMM

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  schedule:
    - cron: "0 0 5,16 * *"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DEPENDENCIES_FILE: r5s/dependencies.txt
  CONFIG_FILE: r5s/.config
  DIY_SH: r5s/diy.sh
  FILES: r5s/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq install $(cat $DEPENDENCIES_FILE)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        chmod +x $DIY_SH
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        $GITHUB_WORKSPACE/$DIY_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && cp -r $FILES openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config

    - name: SSH connect to Actions
      uses: P3TERX/ssh2actions@main
      if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')

    - name: Prepare config and download
      working-directory: ./openwrt
      run: |
        make defconfig
        # 强制启用 CONFIG_TARGET_ROOTFS_TAR（即使不生成，我们也手动提取）
        sed -i '/CONFIG_TARGET_ROOTFS_TAR=/d' .config
        echo "CONFIG_TARGET_ROOTFS_TAR=y" >> .config
        make download -j8
        find dl -size -1024c -exec ls -l {} \; -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: List generated files
      if: always()
      run: |
        echo "=== Content of openwrt/bin/targets/rockchip/ ==="
        ls -la openwrt/bin/targets/rockchip/ || true
        echo "=== Subdirectories ==="
        ls -la openwrt/bin/targets/rockchip/*/ || true

    - name: Extract rootfs from squashfs image using loop device
      id: extract_rootfs
      run: |
        # 查找 squashfs 镜像
        SQUASHFS_IMG=$(find openwrt/bin/targets/rockchip -name "*-squashfs-sysupgrade.img.gz" | head -n1)
        if [ -z "$SQUASHFS_IMG" ]; then
          echo "::error::No squashfs image found!"
          exit 1
        fi
        echo "Found squashfs image: $SQUASHFS_IMG"

        # 创建临时目录
        mkdir -p rootfs_extract

        # 解压 .gz 得到 .img，允许 gzip 返回 2（尾部垃圾警告）
        set +e
        gunzip -c "$SQUASHFS_IMG" > rootfs_extract/firmware.img
        GUNZIP_EXIT_CODE=$?
        set -e
        if [ $GUNZIP_EXIT_CODE -ne 0 ] && [ $GUNZIP_EXIT_CODE -ne 2 ]; then
          echo "::error::gunzip failed with exit code $GUNZIP_EXIT_CODE"
          exit 1
        fi
        echo "gunzip completed with exit code $GUNZIP_EXIT_CODE (0 or 2 is acceptable)"

        # 使用 losetup 挂载镜像（需要 sudo）
        sudo losetup -fP rootfs_extract/firmware.img
        LOOP_DEV=$(sudo losetup -l | grep firmware.img | awk '{print $1}')
        if [ -z "$LOOP_DEV" ]; then
          echo "::error::Failed to get loop device"
          exit 1
        fi
        echo "Loop device: $LOOP_DEV"

        # 创建挂载点
        mkdir -p rootfs_mount
        # 尝试挂载第二个分区（通常是 rootfs，第一个是 boot）
        if sudo mount ${LOOP_DEV}p2 rootfs_mount 2>/dev/null; then
          echo "Mounted partition p2 as rootfs"
        else
          echo "Failed to mount p2, trying p1..."
          sudo mount ${LOOP_DEV}p1 rootfs_mount || {
            echo "::error::Failed to mount any partition"
            sudo losetup -d $LOOP_DEV
            exit 1
          }
        fi

        # 打包 rootfs 为 tar.gz
        sudo tar -czf rootfs_extract/rootfs.tar.gz -C rootfs_mount . || {
          echo "::error::Failed to create tar"
          sudo umount rootfs_mount
          sudo losetup -d $LOOP_DEV
          exit 1
        }

        # 清理
        sudo umount rootfs_mount
        sudo losetup -d $LOOP_DEV

        # 更改 tar 包所有权为当前用户（以便后续步骤读取）
        sudo chown $(id -u):$(id -g) rootfs_extract/rootfs.tar.gz

        # 记录 tar 包路径
        ROOTFS_TAR="$(pwd)/rootfs_extract/rootfs.tar.gz"
        echo "ROOTFS_TAR=$ROOTFS_TAR" >> $GITHUB_ENV
        echo "Rootfs tar created: $ROOTFS_TAR"

    # 以下步骤保留以确保自定义文件（如 first_run.sh）能被正确传递
    - name: Create bootfiles placeholder
      run: |
        mkdir -p r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s
        echo "Placeholder file to prevent cp error" > r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/placeholder.txt

    - name: Prepare files for packit
      run: |
        mkdir -p files
        [ -d r5s/files ] && cp -r r5s/files/* files/ || true
        mkdir -p files/bootfiles/rockchip/rk3568/nanopi-r5s
        if [ -f r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/placeholder.txt ]; then
          cp r5s/files/bootfiles/rockchip/rk3568/nanopi-r5s/placeholder.txt files/bootfiles/rockchip/rk3568/nanopi-r5s/
        else
          echo "Placeholder file" > files/bootfiles/rockchip/rk3568/nanopi-r5s/placeholder.txt
        fi
        echo "=== Prepared files for packit (root directory) ==="
        find files -type f | sort

    - name: Package firmware with multiple kernels
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_OUTPUT_FORMAT: gz
        OPENWRT_ARMVIRT: ${{ env.ROOTFS_TAR }}
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.12.y
        PACKAGE_SOC: diy
        SCRIPT_DIY_PATH: r5s/mk_rk3568_r5s.sh
        WHOAMI: tmxia
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: R5S_OpenWrt_${{ env.PACKAGED_OUTPUTDATE }}
        files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        body: |
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.3.3
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 2
        delete_tags: true